---
- name: Populate service facts
  ansible.builtin.service_facts:

- name: Check whether the Mailpit binary is provided by the Proserver blueprint
  ansible.builtin.stat:
    path: /usr/local/bin/mailpit
  register: mailpit_blueprint_binary
  when: ansible_facts['os_family'] == 'FreeBSD'

- name: Check whether the Mailpit service is provided by the Proserver blueprint
  ansible.builtin.stat:
    path: /usr/local/etc/rc.d/mailpit
  register: mailpit_blueprint_service
  when: ansible_facts['os_family'] == 'FreeBSD'

- name: Verify that Mailpit is available from the Proserver blueprint
  ansible.builtin.assert:
    that:
      - mailpit_blueprint_binary.stat.exists
      - mailpit_blueprint_service.stat.exists
      - mailpit_blueprint_service.stat.executable | default(false)
    fail_msg: >-
      Mailpit is not available in this jail's Proserver blueprint yet. Keep or
      downgrade this jail to MailHog and wait for the Mailpit blueprint upgrade,
      or contact team mOps.
    quiet: true
  when: ansible_facts['os_family'] == 'FreeBSD'

- name: Disable maildev
  ansible.builtin.include_tasks: disable-maildev.yml
  when:
    - ansible_facts['system'] == 'Linux'
    - ansible_facts['services']['maildev.service']['status'] | default('not-found') != 'not-found'

- name: Disable mailhog
  ansible.builtin.include_tasks: disable-mailhog.yml
  when:
    - ansible_facts['os_family'] == 'FreeBSD'
    - ansible_facts['services']['mailhog']['status'] | default('not-found') != 'not-found'

- name: Install and configure mailpit (Linux)
  ansible.builtin.include_tasks:
    file: linux-install.yml
  when: ansible_facts['system'] == 'Linux'

- name: Configure mailpit (FreeBSD)
  ansible.builtin.include_tasks:
    file: freebsd-setup.yml
  when: ansible_facts['os_family'] == 'FreeBSD'

- name: Configure Nginx for mailpit
  ansible.builtin.include_tasks: nginx.yml
  when: mailpit.nginx.enable
